services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eagle
      POSTGRES_PASSWORD: eagle
      POSTGRES_DB: eagle_bank_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eagle -d eagle_bank_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  api-test:
    build: .
    command: pytest -v
    env_file:
      - .env.test
    depends_on:
      db-test:
        condition: service_healthy
